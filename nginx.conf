server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html — всегда перевалидируется, чтобы после деплоя
    # браузер получил новые ссылки на .wasm файлы (content-hash)
    location = /index.html {
        add_header Cache-Control "no-cache";

        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';

        # Required for SharedArrayBuffer (SQLite WASM)
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # Content-hashed статика (.wasm, .js-чанки и т.д.)
    # Имена файлов меняются при каждом билде, поэтому кэш — навсегда
    location ~* \.(wasm|js|css|png|svg)$ {
        add_header Cache-Control "public, immutable";

        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';

        # Required for SharedArrayBuffer (SQLite WASM)
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # Правильные MIME-типы
    types {
        text/html html;
        text/css css;
        application/javascript js;
        application/wasm wasm;
    }
}
