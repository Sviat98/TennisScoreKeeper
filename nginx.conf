	server {
	    listen 80;
	    server_name localhost;

	    root /usr/share/nginx/html;
	    index index.html;

	    location / {
	        try_files $uri $uri/ /index.html;
	    }

	    # index.html — всегда перевалидируется, чтобы после деплоя
	    # браузер получил новые ссылки на .wasm файлы (content-hash)
	    location = /index.html {
	        add_header Cache-Control "no-cache";

	        add_header 'Access-Control-Allow-Origin' '*';
	        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
	        add_header 'Access-Control-Allow-Headers' 'Content-Type';

	        # Required for SharedArrayBuffer (SQLite WASM)
	        add_header Cross-Origin-Opener-Policy "same-origin";
	        add_header Cross-Origin-Embedder-Policy "require-corp";
	    }

	    # Content-hashed WASM файлы — имена меняются при каждом билде,
	    # поэтому кэш на год
	    location ~* \.wasm$ {
	        add_header Cache-Control "public, max-age=31536000, immutable";

	        add_header 'Access-Control-Allow-Origin' '*';
	        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
	        add_header 'Access-Control-Allow-Headers' 'Content-Type';

	        # Required for SharedArrayBuffer (SQLite WASM)
	        add_header Cross-Origin-Opener-Policy "same-origin";
	        add_header Cross-Origin-Embedder-Policy "require-corp";
	    }

	    # JS/CSS файлы НЕ content-hashed (composeApp.js, styles.css) —
	    # всегда перевалидируются, чтобы после деплоя загрузилась новая версия
	    location ~* \.(js|css|png|svg)$ {
	        add_header Cache-Control "no-cache";

	        add_header 'Access-Control-Allow-Origin' '*';
	        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
	        add_header 'Access-Control-Allow-Headers' 'Content-Type';

	        # Required for SharedArrayBuffer (SQLite WASM)
	        add_header Cross-Origin-Opener-Policy "same-origin";
	        add_header Cross-Origin-Embedder-Policy "require-corp";
	    }

	    # Правильный MIME-тип для WASM (остальные наследуются от nginx default)
	    types {
	        application/wasm wasm;
	    }
	}
